<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-purple: #818cf8;
            --bg-dark: #030406;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 30%, #1e1b4b 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
            color: #f8fafc; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .main-screen { 
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            gap: 60px; max-width: 1100px; width: 95%; padding: 40px 20px;
        }

        .video-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.7rem; font-weight: 700; margin-bottom: 30px; text-align: center; letter-spacing: -0.02em; }
        .gradient-text {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 15px rgba(129, 140, 248, 0.4));
        }

        .video-sphere { 
            width: 420px; height: 420px; position: relative; border-radius: 50%; 
            overflow: hidden; background-color: #ffffff; 
            border: 1px solid var(--glass-highlight);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.1);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .video-sphere:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 50px rgba(56, 189, 248, 0.3); }
        .video-sphere video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center 15%; pointer-events: none; 
        }

        .mute-toggle { color: var(--neon-blue); margin-top: 20px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: color 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .mute-toggle:hover { color: #ffffff; }

        .actions-side { flex: 1; max-width: 420px; }
        .glass-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
            padding: 45px 40px; border-radius: 24px; backdrop-filter: blur(24px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        .glass-card h2 { margin-top: 0; font-size: 1.5rem; font-weight: 600; color: #ffffff; margin-bottom: 30px; }

        .btn {
            display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 14px;
            text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; margin-bottom: 16px; 
            color: white; border: 1px solid var(--glass-border); cursor: pointer; width: 100%; box-sizing: border-box;
        }
        .btn-demo { 
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.9) 0%, rgba(129, 140, 248, 0.9) 100%); 
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.25);
        }
        .btn-demo:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(56, 189, 248, 0.4); filter: brightness(1.1); }
        .btn-call { background: rgba(255, 255, 255, 0.03); }
        .btn-call:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.3); }
        .promo-text { font-size: 0.85rem; color: #94a3b8; line-height: 1.6; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); }

        /* ВСПЛЫВАЮЩЕЕ ОКНО (MODAL) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: #0d1117; border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
            width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
            padding: 40px; border-radius: 24px; position: relative;
            transform: translateY(20px); transition: all 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .close-btn {
            position: absolute; top: 20px; right: 20px; background: transparent; border: none;
            color: #94a3b8; font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: white; }

        .modal-content h3 { margin-top: 0; color: white; font-size: 1.4rem; margin-bottom: 10px; }
        .modal-content p { color: #94a3b8; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }

        /* ФОРМА И ПОЛЯ */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #cbd5e1; font-weight: 500; }
        
        .glass-input, .glass-select, .glass-textarea {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: all 0.2s;
        }
        .glass-input:focus, .glass-select:focus, .glass-textarea:focus {
            outline: none; border-color: var(--neon-blue); background: rgba(255,255,255,0.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .glass-textarea { resize: vertical; min-height: 80px; }
        
        /* Стилизация скроллбара в модалке */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        @media (max-width: 900px) {
            .main-screen { flex-direction: column; gap: 40px; padding: 20px; }
            .video-sphere { width: 320px; height: 320px; }
            .modal-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <div class="mute-toggle" onclick="toggleMute(document.querySelector('.video-sphere'))">
                <span id="muteIcon">🔊</span> <span id="muteText">Включить звук</span>
            </div>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                <button onclick="openModal()" class="btn btn-demo">🚀 Запросить демо</button>
                <a href="tel:+79991234567" class="btn btn-call">📞 Позвонить</a>
                
                <p class="promo-text">
                    Специально для участников <b>Global Tech</b>: приоритетная поддержка и разбор процессов локализации.
                </p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="demoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h3>Запрос демо</h3>
            <p>Хотите посмотреть, как AI может улучшить процессы перевода? Заполните форму, и мы организуем персональную демонстрацию.</p>
            
            <form action="https://formspree.io/f/xaqlprnn" method="POST">
                
                <div class="form-group">
                    <label>Имя и Фамилия *</label>
                    <input type="text" name="name" class="glass-input" required placeholder="Иван Иванов">
                </div>

                <div class="form-group">
                    <label>Название компании *</label>
                    <input type="text" name="company" class="glass-input" required placeholder="ООО Космос">
                </div>

                <div class="form-group">
                    <label>E-mail *</label>
                    <input type="email" name="email" class="glass-input" required placeholder="hello@company.com">
                </div>

                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" name="phone" class="glass-input" required placeholder="+7 (999) 000-00-00">
                </div>

                <div class="form-group">
                    <label>Какой продукт вас интересует?</label>
                    <select name="product" class="glass-select">
                        <option value="Custom.MT Console">Custom.MT Console</option>
                        <option value="Document Translation Portal">Document Translation Portal</option>
                        <option value="Другие интеграции">Другие интеграции</option>
                        <option value="Пока не уверен(а)">Пока не уверен(а)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Форматы и типы документов<br><span style="font-size:0.8rem; color:#64748b; font-weight:normal;">(например: DOCX, XLSX, InDesign, фокус на общую автоматизацию и скорость)</span></label>
                    <input type="text" name="formats" class="glass-input" placeholder="Перечислите форматы и типы">
                </div>

                <div class="form-group">
                    <label>Опишите вашу текущую задачу или процесс</label>
                    <textarea name="task_description" class="glass-textarea" placeholder="Что вы хотите автоматизировать? Как сейчас организован перевод?"></textarea>
                </div>

                <button type="submit" class="btn btn-demo" style="margin-top: 10px;">Отправить заявку</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var icon = document.getElementById('muteIcon');
            var text = document.getElementById('muteText');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 10px 60px rgba(129, 140, 248, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2)';
                container.style.borderColor = 'rgba(129, 140, 248, 0.5)';
                icon.innerHTML = "🔇"; text.innerHTML = "Выключить звук";
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 40px rgba(56, 189, 248, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.1)';
                container.style.borderColor = 'rgba(255, 255, 255, 0.15)';
                icon.innerHTML = "🔊"; text.innerHTML = "Включить звук";
            }
        }

        // Логика Модального окна
        const modal = document.getElementById('demoModal');
        function openModal() { modal.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeModal() { modal.classList.remove('active'); document.body.style.overflow = 'auto'; }
        
        // Закрытие по клику вне окна
        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
    </script>

</body>
</html>
