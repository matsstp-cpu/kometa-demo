<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-neon: #58a6ff;
            --purple-neon: #bc85ff;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            background-attachment: fixed;
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        .main-screen { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 60px; 
            max-width: 1200px; 
            width: 95%;
            padding: 40px;
        }

        /* ЛЕВАЯ СТОРОНА */
        .video-side { flex: 1.2; display: flex; flex-direction: column; align-items: center; }

        h1 { 
            font-size: 3rem; 
            font-weight: 800;
            margin-bottom: 30px; 
            text-align: center;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--blue-neon), var(--purple-neon)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            /* Неоновое свечение текста */
            filter: drop-shadow(0 0 10px rgba(188, 133, 255, 0.5));
        }

        /* КРУГЛОЕ ОКНО С НЕОНОМ */
        .video-sphere { 
            width: 440px; 
            height: 440px; 
            position: relative; 
            border-radius: 50%; 
            overflow: hidden; 
            background-color: #ffffff; /* Твой белый фон по краям */
            /* Сложный неон: внутреннее синее свечение + внешнее фиолетовое */
            border: 2px solid var(--glass-border);
            box-shadow: 
                0 0 20px rgba(88, 166, 255, 0.3),
                0 0 60px rgba(188, 133, 255, 0.2),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-sphere:hover { 
            transform: scale(1.03) rotate(1deg);
            box-shadow: 
                0 0 30px rgba(88, 166, 255, 0.5),
                0 0 80px rgba(188, 133, 255, 0.4);
        }

        .video-sphere video { 
            position: absolute; top: 50%; left: 50%;
            width: 110%; height: 110%;
            transform: translate(-50%, -50%); 
            object-fit: cover;
            object-position: center 10%;
        }

        /* ПРАВАЯ СТОРОНА: КАРТОЧКА */
        .actions-side { flex: 0.8; max-width: 420px; }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 40px;
            backdrop-filter: blur(25px); /* Усиленное размытие */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Эффект блика на стекле */
        .glass-card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .glass-card h2 { 
            margin-top: 0; 
            font-size: 1.6rem; 
            font-weight: 600;
            color: var(--purple-neon); 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px rgba(188, 133, 255, 0.3);
        }

        /* КНОПКИ */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border-radius: 20px;
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease; 
            margin-bottom: 20px; 
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-demo { 
            background: linear-gradient(135deg, var(--blue-neon) 0%, var(--purple-neon) 100%); 
            border: none;
            box-shadow: 0 10px 25px rgba(88, 166, 255, 0.3);
        }

        .btn-demo:hover { 
            box-shadow: 0 15px 35px rgba(188, 133, 255, 0.6); 
            transform: translateY(-4px); 
            letter-spacing: 2px;
        }

        .btn-call { 
            background: rgba(255, 255, 255, 0.05); 
        }

        .btn-call:hover { 
            background: rgba(88, 166, 255, 0.15); 
            border-color: var(--blue-neon);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        .btn-mail { background: transparent; opacity: 0.6; font-size: 0.9rem; }
        .btn-mail:hover { opacity: 1; transform: translateX(5px); }

        .promo-text { 
            font-size: 0.9rem; 
            color: #8b949e; 
            line-height: 1.6; 
            margin-top: 25px; 
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 900px) {
            .main-screen { flex-direction: column; gap: 40px; padding: 20px; }
            .video-sphere { width: 320px; height: 320px; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <p style="color: var(--blue-neon); margin-top: 25px; font-size: 0.9rem; font-weight: 600; cursor:pointer; text-transform: uppercase; letter-spacing: 1px;" onclick="toggleMute(document.querySelector('.video-sphere'))">
                <span>🔊</span> Включить звук
            </p>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                
                <a href="https://calendly.com/your-link" class="btn btn-demo">🚀 Запросить демо</a>
                <a href="tel:+79991234567" class="btn btn-call">📞 Позвонить</a>
                <a href="mailto:hello@custom.mt" class="btn btn-mail">✉️ Написать письмо</a>

                <p class="promo-text">
                    Специально для <b>Global Tech</b>: персональный разбор процессов локализации от наших экспертов.
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var text = document.querySelector('.video-side p');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 0 40px rgba(88, 166, 255, 0.6), 0 0 100px rgba(188, 133, 255, 0.4)';
                text.innerHTML = "<span>🔇</span> Выключить звук";
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 20px rgba(88, 166, 255, 0.3), 0 0 60px rgba(188, 133, 255, 0.2)';
                text.innerHTML = "<span>🔊</span> Включить звук";
            }
        }
    </script>

</body>
</html>
