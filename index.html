<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        /* Базовые космические стили */
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1b2735 0%, #050608 100%); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Главный контейнер - теперь это FLEX-ряд */
        .main-screen { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 50px; 
            max-width: 1200px; 
            width: 90%;
            padding: 40px;
        }

        /* ЛЕВАЯ ЧАСТЬ: ВИДЕО-КОНСОЛЬ */
        .video-side { flex: 1.5; display: flex; flex-direction: column; align-items: flex-start; }

        h1 { 
            font-size: 3rem; margin: 0 0 10px 0; text-align: left;
            background: linear-gradient(90deg, #58a6ff, #bc85ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(88, 166, 255, 0.4);
        }

        .video-console { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            position: relative; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 4px solid rgba(88, 166, 255, 0.6); 
            box-shadow: 0 0 60px rgba(88, 166, 255, 0.2); 
            background: #000;
            cursor: pointer;
        }

        .video-console video { 
            position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%; 
            transform: translate(-50%, -50%); 
            object-fit: cover; /* Здесь можешь менять на contain, если лицо все еще режется */
        }

        /* ПРАВАЯ ЧАСТЬ: КНОПКИ */
        .actions-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            min-width: 300px;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(88, 166, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: left;
        }

        .action-card h2 { margin: 0 0 15px 0; font-size: 1.4rem; color: #58a6ff; }

        /* Стили кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-bottom: 12px;
            color: white;
        }

        .btn-demo { background: #238636; box-shadow: 0 5px 15px rgba(35, 134, 54, 0.3); }
        .btn-demo:hover { background: #2ea043; transform: translateY(-2px); }

        .btn-call { background: rgba(88, 166, 255, 0.1); border: 1px solid #58a6ff; }
        .btn-call:hover { background: rgba(88, 166, 255, 0.2); }

        .btn-mail { background: transparent; border: 1px solid rgba(163, 179, 188, 0.5); color: #a3b3bc; }
        .btn-mail:hover { border-color: white; color: white; }

        /* Мобильная версия */
        @media (max-width: 900px) {
            .main-screen { flex-direction: column; text-align: center; }
            .video-side { align-items: center; }
            h1 { text-align: center; font-size: 2.2rem; }
            .actions-side { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1>Проект «Комета» ☄️</h1>
            <div class="video-console" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                    Ваш браузер не поддерживает видео.
                </video>
            </div>
            <p style="color: #8b949e; margin-top: 15px;">Кликните на видео, чтобы включить звук</p>
        </div>

        <div class="actions-side">
            <div class="action-card">
                <h2>Свяжитесь с нами</h2>
                
                <a href="https://forms.gle/bzpaXiKaTiDXVaj18" class="btn btn-demo">🚀 Запросить демо</a>
                
                <a href="tel:+79613068326" class="btn btn-call">📞 Позвонить</a>
                
                <a href="mailto:a.mats@localtrans.ru" class="btn btn-mail">✉️ Отправить письмо</a>

                <p style="font-size: 0.9rem; color: #8b949e; margin-top: 15px; line-height: 1.4;">
                    Участникам <b>Global Tech</b> — приоритетная поддержка и индивидуальные условия внедрения.
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 0 60px rgba(188, 133, 255, 0.5)';
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 60px rgba(88, 166, 255, 0.2)';
            }
        }
    </script>

</body>
</html>
