<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        /* ГЛУБОКИЙ КОСМОС С ЭФФЕКТОМ ЗВЕЗДНОЙ ПЫЛИ */
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #111827 0%, #030406 100%);
            background-attachment: fixed;
            color: white; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Контейнер: окна теперь ближе друг к другу */
        .main-screen { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 40px; /* Сблизили блоки */
            max-width: 1100px; 
            width: 95%;
            padding: 20px;
        }

        /* ЛЕВАЯ СТОРОНА: МАРИНА */
        .video-side { flex: 1; display: flex; flex-direction: column; align-items: center; }

        h1 { 
            font-size: 2.5rem; margin-bottom: 20px; text-align: center;
        }

        /* Градиент только для текста, чтобы эмодзи не красился */
        .gradient-text {
            background: linear-gradient(90deg, #58a6ff, #bc85ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(188, 133, 255, 0.4));
        }

        /* КРУГЛОЕ ОКНО С ЭФФЕКТОМ СТЕКЛА */
        .video-sphere { 
            width: 340px; height: 340px; 
            position: relative; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(88, 166, 255, 0.4); 
            box-shadow: 0 0 50px rgba(88, 166, 255, 0.15); 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .video-sphere:hover { transform: scale(1.02); }

        /* ВОЗВРАЩАЕМ ЛИЦО: Убрали 140%, видео аккуратно заполняет круг */
        .video-sphere video { 
            position: absolute; top: 50%; left: 50%;
            width: 100%; /* Чуть-чуть больше 100%, чтобы избежать тонких черных полосок по краям от HeyGen */
            height: 100%;
            transform: translate(-60%, -60%); 
            object-fit: cover; /* Заполняет круг без сплющивания */
            object-position: center 30%; /* Сдвигает фокус чуть выше, чтобы лицо точно не обрезалось */
        }

        /* ПРАВАЯ СТОРОНА: КАРТОЧКА И КНОПКИ */
        .actions-side { flex: 1; max-width: 400px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .glass-card h2 { margin-top: 0; font-size: 1.5rem; color: #bc85ff; margin-bottom: 25px; }

        /* КНОПКИ В СТИЛЕ СТЕКЛА И КОМЕТЫ */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 18px; border-radius: 15px;
            text-decoration: none; font-weight: 600; font-size: 1.1rem;
            transition: all 0.3s ease; margin-bottom: 15px; color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Главная кнопка: градиент кометы */
        .btn-demo { 
            background: linear-gradient(135deg, #58a6ff 0%, #bc85ff 100%); 
            border: none;
            box-shadow: 0 10px 20px rgba(188, 133, 255, 0.2);
        }
        .btn-demo:hover { 
            box-shadow: 0 15px 30px rgba(188, 133, 255, 0.4); 
            transform: translateY(-3px); 
        }

        .btn-call { background: rgba(88, 166, 255, 0.1); }
        .btn-call:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; }

        .btn-mail { background: transparent; opacity: 0.8; }
        .btn-mail:hover { opacity: 1; border-color: white; }

        .promo-text { font-size: 0.85rem; color: #8b949e; line-height: 1.4; margin-top: 20px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            .main-screen { flex-direction: column; gap: 30px; }
            .video-sphere { width: 280px; height: 280px; }
            .actions-side { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <p style="color: #58a6ff; margin-top: 15px; font-size: 0.9rem; cursor:pointer;" onclick="toggleMute(document.querySelector('.video-sphere'))">
                🔊 Включить звук
            </p>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                
                <a href="https://calendly.com/your-link" class="btn btn-demo">🚀 Запросить демо</a>
                <a href="tel:+79991234567" class="btn btn-call">📞 Позвонить</a>
                <a href="mailto:hello@custom.mt" class="btn btn-mail">✉️ Написать письмо</a>

                <p class="promo-text">
                    Специально для <b>Global Tech</b>: персональный разбор процессов локализации.
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var text = document.querySelector('.video-side p');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 0 60px rgba(188, 133, 255, 0.4)';
                text.innerHTML = "🔇 Выключить звук";
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 50px rgba(88, 166, 255, 0.15)';
                text.innerHTML = "🔊 Включить звук";
            }
        }
    </script>

</body>
</html>
