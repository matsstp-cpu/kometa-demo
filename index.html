<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ: Глубокий космос */
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            background-attachment: fixed;
            color: #f8fafc; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        .main-screen { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 50px; 
            max-width: 1200px; 
            width: 95%;
            padding: 30px;
        }

        /* ЛЕВАЯ СТОРОНА: МАРИНА */
        .video-side { flex: 1; display: flex; flex-direction: column; align-items: center; }

        h1 { 
            font-size: 2.8rem; font-weight: 700; margin-bottom: 25px; text-align: center;
            letter-spacing: -0.02em;
        }

        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(56, 189, 248, 0.3));
        }

        /* ТО САМОЕ КРУГЛОЕ ОКНО (Твои настройки + мягкий неон) */
        .video-sphere { 
            width: 420px; 
            height: 420px; 
            position: relative; 
            border-radius: 50%; 
            overflow: hidden; 
            background-color: #ffffff; /* Белый фон, как ты просила */
            border: 2px solid rgba(255, 255, 255, 0.1); 
            /* Многослойное свечение: мягкий синий и фиолетовый */
            box-shadow: 
                0 0 30px rgba(56, 189, 248, 0.2), 
                0 0 60px rgba(129, 140, 248, 0.15); 
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-sphere:hover { 
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.4);
        }

        .video-sphere video { 
            position: absolute; top: 50%; left: 50%;
            /* Твои идеальные настройки отдаления */
            width: 110%; 
            height: 110%;
            transform: translate(-50%, -50%); 
            object-fit: cover; 
            object-position: center 10%; 
        }

        /* ПРАВАЯ СТОРОНА: КАРТОЧКА */
        .actions-side { flex: 1; max-width: 400px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-card h2 { 
            margin-top: 0; font-size: 1.4rem; font-weight: 600;
            color: #e2e8f0; margin-bottom: 25px; 
        }

        /* КНОПКИ: Чистый дизайн без кричащих цветов */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 18px; border-radius: 16px;
            text-decoration: none; font-weight: 600; font-size: 1.05rem;
            transition: all 0.2s ease; margin-bottom: 15px; color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-demo { 
            background: linear-gradient(135deg, #0284c7 0%, #4f46e5 100%); 
            border: none;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }
        .btn-demo:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.5);
        }

        .btn-call { 
            background: rgba(255, 255, 255, 0.05); 
        }
        .btn-call:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
        }

        .btn-mail { background: transparent; opacity: 0.7; font-size: 0.9rem; }
        .btn-mail:hover { opacity: 1; text-decoration: underline; }

        .promo-text { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; margin-top: 25px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            .main-screen { flex-direction: column; gap: 30px; text-align: center; }
            .video-sphere { width: 300px; height: 300px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <p style="color: #38bdf8; margin-top: 20px; font-size: 0.9rem; font-weight: 500; cursor:pointer;" onclick="toggleMute(document.querySelector('.video-sphere'))">
                🔊 Включить звук
            </p>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                
                <a href="https://calendly.com/your-link" class="btn btn-demo">🚀 Запросить демо</a>
                <a href="tel:+79991234567" class="btn btn-call">📞 Позвонить</a>
                <a href="mailto:hello@custom.mt" class="btn btn-mail">✉️ Написать письмо</a>

                <p class="promo-text">
                    Специально для <b>Global Tech</b>: персональный разбор процессов локализации.
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var text = document.querySelector('.video-side p');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 0 40px rgba(56, 189, 248, 0.5)';
                text.innerHTML = "🔇 Выключить звук";
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 30px rgba(56, 189, 248, 0.2), 0 0 60px rgba(129, 140, 248, 0.15)';
                text.innerHTML = "🔊 Включить звук";
            }
        }
    </script>

</body>
</html>
