<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-purple: #818cf8;
            --bg-dark: #030406;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 30%, #1e1b4b 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
            color: #f8fafc; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        .main-screen { 
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            gap: 60px; max-width: 1100px; width: 95%; padding: 40px 20px;
        }

        .video-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.7rem; font-weight: 700; margin-bottom: 30px; text-align: center; }
        .gradient-text {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 15px rgba(129, 140, 248, 0.4));
        }

        /* КРУГЛОЕ ОКНО МАРИНЫ (МАСШТАБ ПО ПОЯС) */
        .video-sphere { 
            width: 410px; height: 410px; position: relative; border-radius: 50%; 
            overflow: hidden; background-color: #ffffff; 
            border: 1px solid var(--glass-highlight);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.15);
            cursor: pointer; transition: all 0.4s ease;
        }
        
        .video-sphere video { 
            position: absolute; top: 0; left: 0; width: 110%; height: 110%;
            /* 'contain' позволяет увидеть логотип на футболке и маскота по пояс */
            object-fit: contain; 
            object-position: center bottom;
        }

        .mute-toggle { color: var(--neon-blue); margin-top: 20px; font-size: 0.9rem; cursor: pointer; }

        /* КАРТОЧКА */
        .actions-side { flex: 1; max-width: 420px; }
        .glass-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 45px 40px; border-radius: 24px; backdrop-filter: blur(24px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        .glass-card h2 { margin-top: 0; font-size: 1.5rem; color: #ffffff; margin-bottom: 30px; }

        .btn {
            display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 14px;
            text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; margin-bottom: 16px; 
            color: white; border: 1px solid var(--glass-border); cursor: pointer; width: 100%; box-sizing: border-box;
        }
        .btn-demo { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); border: none; }
        .btn-call { background: rgba(255, 255, 255, 0.03); }
        .btn-call:hover { border-color: var(--neon-blue); }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: #0d1117; border: 1px solid var(--glass-border);
            width: 90%; max-width: 450px; padding: 40px; border-radius: 24px; position: relative;
            text-align: center;
        }
        
        .close-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .glass-input, .glass-select, .glass-textarea {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;
            font-size: 0.95rem; box-sizing: border-box;
        }

        .phone-display { font-size: 1.8rem; font-weight: 700; color: var(--neon-blue); margin: 20px 0; display: block; }

        @media (max-width: 900px) {
            .main-screen { flex-direction: column; text-align: center; }
            .video-sphere { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <div class="mute-toggle" onclick="toggleMute(document.querySelector('.video-sphere'))">
                <span id="muteIcon">🔊</span> <span id="muteText">Включить звук</span>
            </div>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                <button onclick="openModal('demoModal')" class="btn btn-demo">🚀 Запросить демо</button>
                <button onclick="openModal('callModal')" class="btn btn-call">📞 Позвонить</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="demoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('demoModal')">×</button>
            <h3>Запрос демо</h3>
            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <div class="form-group"><input type="text" name="name" class="glass-input" required placeholder="Имя и Фамилия"></div>
                <div class="form-group"><input type="text" name="company" class="glass-input" required placeholder="Компания"></div>
                <div class="form-group"><input type="email" name="email" class="glass-input" required placeholder="E-mail"></div>
                <div class="form-group"><input type="tel" name="phone" class="glass-input" required placeholder="Телефон"></div>
                <div class="form-group">
                    <select name="product" class="glass-select">
                        <option value="Console">Custom.MT Console</option>
                        <option value="Portal">Document Translation Portal</option>
                        <option value="Other">Другие интеграции</option>
                    </select>
                </div>
                <div class="form-group"><textarea name="task" class="glass-textarea" placeholder="Ваша задача..."></textarea></div>
                <button type="submit" class="btn btn-demo">Отправить</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="callModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('callModal')">×</button>
            <h3>Связаться по телефону</h3>
            <p>Наш специалист готов ответить на ваши вопросы:</p>
            <span class="phone-display">+7 (999) 123-45-67</span>
            <a href="tel:+79991234567" class="btn btn-demo">Начать вызов</a>
            <p style="font-size: 0.8rem; color: #94a3b8;">Звонок бесплатный для жителей РФ</p>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var icon = document.getElementById('muteIcon');
            var text = document.getElementById('muteText');
            if (video.muted) {
                video.muted = false;
                icon.innerHTML = "🔇"; text.innerHTML = "Выключить звук";
            } else {
                video.muted = true;
                icon.innerHTML = "🔊"; text.innerHTML = "Включить звук";
            }
        }

        function openModal(id) { 
            document.getElementById(id).classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
