<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект Комета | Custom.MT</title>
    <style>
        :root {
            --blue-neon: #38bdf8;
            --purple-neon: #bc85ff;
            --purple-glow: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* БАЗОВЫЕ НАСТРОЙКИ: Глубокий премиальный темный */
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            background-attachment: fixed;
            color: #f8fafc; 
            /* Вернули родной системный шрифт */
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        .main-screen { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 60px; /* Идеальное расстояние */
            max-width: 1200px; 
            width: 95%;
            padding: 40px;
        }

        /* ЛЕВАЯ СТОРОНА: МАРИНА */
        .video-side { flex: 1.2; display: flex; flex-direction: column; align-items: center; }

        h1 { 
            font-size: 2.8rem; font-weight: 700; margin-bottom: 25px; text-align: center;
            letter-spacing: -0.01em;
            /* Сдвигаем заголовок вправо для асимметрии */
            margin-left: 50px; 
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--blue-neon), var(--purple-neon)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            /* Неоновое свечение текста */
            filter: drop-shadow(0 0 10px rgba(188, 133, 255, 0.5));
        }

        /* КРУГЛОЕ ОКНО С НЕОНОМ */
        .video-sphere { 
            width: 440px; 
            height: 440px; 
            position: relative; 
            border-radius: 50%; 
            overflow: hidden; 
            background-color: #ffffff; /* Твой белый фон по краям */
            border: 2px solid rgba(255, 255, 255, 0.1);
            /* Сложный неон: внутреннее синее свечение + внешнее фиолетовое */
            box-shadow: 
                0 0 20px rgba(56, 189, 248, 0.2), 
                0 0 60px rgba(188, 133, 255, 0.2), 
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Сдвигаем Марину влево, чтобы заголовок был правее */
            margin-left: -60px; 
        }

        .video-sphere:hover { 
            transform: scale(1.02);
            box-shadow: 
                0 0 30px rgba(56, 189, 248, 0.4), 
                0 0 80px rgba(188, 133, 255, 0.4);
        }

        .video-sphere video { 
            position: absolute; top: 50%; left: 50%;
            /* Твои идеальные настройки отдаления Марины */
            width: 110%; 
            height: 110%;
            transform: translate(-50%, -50%); 
            object-fit: cover; 
            object-position: center 10%; 
        }

        /* ПРАВАЯ СТОРОНА: КАРТОЧКА И КНОПКИ */
        .actions-side { flex: 0.8; max-width: 400px; }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(20px); /* Усиленное размытие */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-card h2 { 
            margin-top: 0; font-size: 1.5rem; font-weight: 600;
            color: var(--purple-neon); margin-bottom: 25px; 
            text-shadow: 0 0 10px rgba(188, 133, 255, 0.3);
        }

        /* КНОПКИ В СТИЛЕ НЕОНА И СТЕКЛА */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 18px; border-radius: 16px;
            text-decoration: none; font-weight: 600; font-size: 1.05rem;
            transition: all 0.3s ease; margin-bottom: 18px; color: white;
            border: 1px solid var(--glass-border);
        }

        /* Главная кнопка: градиент кометы с неоном */
        .btn-demo { 
            background: linear-gradient(135deg, var(--blue-neon) 0%, var(--purple-neon) 100%); 
            border: none;
            box-shadow: 0 10px 20px rgba(188, 133, 255, 0.2);
        }
        .btn-demo:hover { 
            box-shadow: 0 15px 30px rgba(188, 133, 255, 0.4); 
            transform: translateY(-3px); 
        }

        /* Кнопки с обводкой */
        .btn-call { 
            background: rgba(255, 255, 255, 0.05); 
        }
        .btn-call:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--blue-neon);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .btn-mail { background: transparent; opacity: 0.7; font-size: 0.9rem; }
        .btn-mail:hover { opacity: 1; transform: translateX(5px); }

        .promo-text { font-size: 0.85rem; color: #8b949e; line-height: 1.5; margin-top: 25px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 900px) {
            .main-screen { flex-direction: column; gap: 40px; text-align: center; }
            .video-side { align-items: center; }
            .video-sphere { width: 300px; height: 300px; margin-left: 0; }
            h1 { font-size: 2rem; margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="video-side">
            <h1><span class="gradient-text">Проект «Комета»</span> ☄️</h1>
            <div class="video-sphere" onclick="toggleMute(this)">
                <video id="marinaVideo" autoplay muted loop playsinline>
                    <source src="Avatar_Video.mp4" type="video/mp4">
                </video>
            </div>
            <p style="color: var(--blue-neon); margin-top: 20px; font-size: 0.9rem; font-weight: 500; cursor:pointer;" onclick="toggleMute(document.querySelector('.video-sphere'))">
                🔊 Включить звук
            </p>
        </div>

        <div class="actions-side">
            <div class="glass-card">
                <h2>Свяжитесь с нами</h2>
                
                <a href="https://calendly.com/your-link" class="btn btn-demo">🚀 Запросить демо</a>
                <a href="tel:+79991234567" class="btn btn-call">📞 Позвонить</a>
                <a href="mailto:hello@custom.mt" class="btn btn-mail">✉️ Написать письмо</a>

                <p class="promo-text">
                    Специально для <b>Global Tech</b>: персональный разбор процессов локализации.
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleMute(container) {
            var video = container.querySelector('video');
            var text = document.querySelector('.video-side p');
            if (video.muted) {
                video.muted = false;
                container.style.boxShadow = '0 0 60px rgba(188, 133, 255, 0.4)';
                text.innerHTML = "🔇 Выключить звук";
            } else {
                video.muted = true;
                container.style.boxShadow = '0 0 20px rgba(56, 189, 248, 0.2), 0 0 60px rgba(188, 133, 255, 0.2)';
                text.innerHTML = "🔊 Включить звук";
            }
        }
    </script>

</body>
</html>
